openapi: 3.0.3
info:
  title: 勤怠管理アプリ API
  version: 1.0.0
  description: 社員の出退勤打刻・勤怠管理を行う REST API

servers:
  - url: http://localhost:8080/api
    description: ローカル開発

paths:
  # --- 認証 ---
  /auth/login:
    post:
      tags: [認証]
      summary: ログイン
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 認証失敗

  /auth/me:
    get:
      tags: [認証]
      summary: ログインユーザー情報取得
      operationId: getCurrentUser
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '401':
          description: 未認証

  /auth/logout:
    post:
      tags: [認証]
      summary: ログアウト
      operationId: logout
      responses:
        '204':
          description: ログアウト成功

  # --- 打刻 ---
  /attendance/clock-in:
    post:
      tags: [打刻]
      summary: 出勤打刻
      operationId: clockIn
      responses:
        '200':
          description: 打刻成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecordResponse'
        '409':
          description: 既に出勤済み

  /attendance/clock-out:
    post:
      tags: [打刻]
      summary: 退勤打刻
      operationId: clockOut
      responses:
        '200':
          description: 打刻成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecordResponse'
        '409':
          description: 未出勤 or 既に退勤済み

  /attendance/today:
    get:
      tags: [打刻]
      summary: 本日の打刻状態取得
      operationId: getTodayRecord
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecordResponse'
        '204':
          description: 本日未打刻

  # --- 勤怠履歴・集計 ---
  /attendance/records:
    get:
      tags: [勤怠履歴]
      summary: 月次勤怠一覧（自分）
      operationId: getMyMonthlyRecords
      parameters:
        - name: yearMonth
          in: query
          required: true
          schema:
            type: string
            example: "2026-07"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttendanceRecordResponse'

  /attendance/summary:
    get:
      tags: [勤怠履歴]
      summary: 月次集計（自分）
      operationId: getMySummary
      parameters:
        - name: yearMonth
          in: query
          required: true
          schema:
            type: string
            example: "2026-07"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlySummaryResponse'

  /attendance/records/{id}:
    put:
      tags: [打刻修正]
      summary: 打刻修正
      operationId: updateRecord
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecordRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecordResponse'
        '403':
          description: 権限なし
        '404':
          description: レコードが存在しない

  # --- 管理者: 勤怠管理 ---
  /admin/attendance/records:
    get:
      tags: [管理者-勤怠]
      summary: 指定社員の月次勤怠一覧
      operationId: getEmployeeMonthlyRecords
      parameters:
        - name: employeeId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: yearMonth
          in: query
          required: true
          schema:
            type: string
            example: "2026-07"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttendanceRecordResponse'

  /admin/attendance/summary:
    get:
      tags: [管理者-勤怠]
      summary: 指定社員の月次集計
      operationId: getEmployeeSummary
      parameters:
        - name: employeeId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: yearMonth
          in: query
          required: true
          schema:
            type: string
            example: "2026-07"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlySummaryResponse'

  # --- 管理者: 社員管理 ---
  /admin/employees:
    get:
      tags: [管理者-社員管理]
      summary: 社員一覧取得
      operationId: getAllEmployees
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmployeeResponse'

    post:
      tags: [管理者-社員管理]
      summary: 社員登録
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '409':
          description: メールアドレス重複

  /admin/employees/{id}:
    get:
      tags: [管理者-社員管理]
      summary: 社員詳細取得
      operationId: getEmployee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '404':
          description: 社員が存在しない

    put:
      tags: [管理者-社員管理]
      summary: 社員情報更新
      operationId: updateEmployee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployeeRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '404':
          description: 社員が存在しない

    delete:
      tags: [管理者-社員管理]
      summary: 社員論理削除
      operationId: deactivateEmployee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 削除成功
        '404':
          description: 社員が存在しない

components:
  schemas:
    # --- Request ---
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    CreateEmployeeRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [EMPLOYEE, ADMIN]

    UpdateEmployeeRequest:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        role:
          type: string
          enum: [EMPLOYEE, ADMIN]

    UpdateRecordRequest:
      type: object
      required: [clockIn]
      properties:
        clockIn:
          type: string
          format: date-time
        clockOut:
          type: string
          format: date-time
          nullable: true

    # --- Response ---
    LoginResponse:
      type: object
      properties:
        employee:
          $ref: '#/components/schemas/EmployeeResponse'

    EmployeeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        employeeCode:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [EMPLOYEE, ADMIN]
        active:
          type: boolean

    AttendanceRecordResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        employeeId:
          type: integer
          format: int64
        date:
          type: string
          format: date
        clockIn:
          type: string
          format: date-time
        clockOut:
          type: string
          format: date-time
          nullable: true
        workingMinutes:
          type: integer
          description: 実勤務分数（休憩控除後）
        overtimeMinutes:
          type: integer
          description: 残業分数

    MonthlySummaryResponse:
      type: object
      properties:
        yearMonth:
          type: string
          example: "2026-07"
        totalWorkingDays:
          type: integer
        totalWorkingMinutes:
          type: integer
        totalOvertimeMinutes:
          type: integer
